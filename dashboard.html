<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard สถิติเคหะรักษ์ | BCH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style> 
        body { font-family: 'Prompt', sans-serif; } 
        /* แต่ง Scrollbar ให้สวยงามสำหรับกล่องคอมเมนต์ */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-900"><i class="fa-solid fa-chart-pie mr-2 text-blue-600"></i> Dashboard สถิติความพึงพอใจ</h1>
                <p class="text-slate-500 text-sm mt-1">แผนกเคหะรักษ์ โรงพยาบาลกรุงเทพคริสเตียน</p>
            </div>
            <button onclick="fetchData()" class="bg-white border border-slate-200 hover:bg-slate-50 text-blue-600 px-5 py-2.5 rounded-xl text-sm font-medium shadow-sm transition-all flex items-center gap-2 cursor-pointer">
                <i class="fa-solid fa-rotate-right"></i> รีเฟรชข้อมูล
            </button>
        </div>

        <div id="loading" class="text-center py-20">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <p class="text-slate-500 font-medium">กำลังดึงข้อมูลสถิติ...</p>
        </div>

        <div id="dashboardContent" class="hidden space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 text-xl"><i class="fa-solid fa-users"></i></div>
                    <div>
                        <p class="text-slate-500 text-sm">จำนวนผู้ประเมิน</p>
                        <h3 class="text-2xl font-bold text-slate-800" id="totalResponses">0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-pink-50 flex items-center justify-center text-pink-600 text-xl"><i class="fa-solid fa-star"></i></div>
                    <div>
                        <p class="text-slate-500 text-sm">คะแนนภาพรวมเฉลี่ย</p>
                        <h3 class="text-2xl font-bold text-slate-800" id="avgOverall">0.00</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center text-green-600 text-xl"><i class="fa-solid fa-bolt"></i></div>
                    <div>
                        <p class="text-slate-500 text-sm">ความรวดเร็วเฉลี่ย</p>
                        <h3 class="text-2xl font-bold text-slate-800" id="avgSpeed">0.00</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-purple-50 flex items-center justify-center text-purple-600 text-xl"><i class="fa-solid fa-broom"></i></div>
                    <div>
                        <p class="text-slate-500 text-sm">คุณภาพงานเฉลี่ย</p>
                        <h3 class="text-2xl font-bold text-slate-800" id="avgQuality">0.00</h3>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2">
                    <h3 class="text-md font-semibold text-slate-800 mb-4"><i class="fa-solid fa-chart-column text-blue-500 mr-2"></i> คะแนนเฉลี่ยแยกตามหัวข้อ</h3>
                    <div class="relative h-72 w-full">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-md font-semibold text-slate-800 mb-4"><i class="fa-solid fa-chart-pie text-blue-500 mr-2"></i> สัดส่วนความพึงพอใจรวม</h3>
                    <div class="relative h-72 w-full flex justify-center">
                        <canvas id="doughnutChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-3">
                    <h3 class="text-md font-semibold text-slate-800 mb-4"><i class="fa-regular fa-comments text-blue-500 mr-2"></i> ข้อเสนอแนะเพิ่มเติมจากผู้ใช้งาน</h3>
                    <div id="commentsContainer" class="space-y-3 max-h-80 overflow-y-auto custom-scrollbar pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // *** สำคัญมาก: นำ URL Web App ของ Google Apps Script มาใส่ตรงนี้ ***
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLFGhinEUTxIOJ8SgoD-mdaP8I9AEjq44jCN_nse5-AYWhcJkGIEOJf3tRTgAVU94q/exec";

        let barChartInstance = null;
        let doughnutChartInstance = null;

        const getAverage = (arr) => arr.length ? (arr.reduce((a, b) => a + Number(b), 0) / arr.length).toFixed(2) : "0.00";

        async function fetchData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('hidden');

            try {
                const response = await fetch(APP_SCRIPT_URL);
                const result = await response.json();

                if(result.status === 'success') {
                    const data = result.data.filter(row => row.scoreOverall); 
                    
                    document.getElementById('totalResponses').innerText = data.length;
                    
                    const scoresOverall = data.map(r => r.scoreOverall);
                    const scoresSpeed = data.map(r => r.scoreSpeed);
                    const scoresQuality = data.map(r => r.scoreQuality);
                    const scoresSystem = data.map(r => r.scoreSystem);
                    const scoresManner = data.map(r => r.scoreManner);
                    
                    // ดึงข้อเสนอแนะ กรองเฉพาะอันที่ไม่ได้พิมพ์ว่างเปล่า
                    const comments = data.map(r => r.comments).filter(c => c && c.toString().trim() !== "");

                    document.getElementById('avgOverall').innerText = getAverage(scoresOverall);
                    document.getElementById('avgSpeed').innerText = getAverage(scoresSpeed);
                    document.getElementById('avgQuality').innerText = getAverage(scoresQuality);

                    renderCharts(
                        [getAverage(scoresSystem), getAverage(scoresSpeed), getAverage(scoresQuality), getAverage(scoresManner), getAverage(scoresOverall)],
                        scoresOverall
                    );

                    renderComments(comments);

                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('dashboardContent').classList.remove('hidden');
                }
            } catch (error) {
                alert('เกิดข้อผิดพลาดในการดึงข้อมูล กรุณาตรวจสอบ URL หรือสิทธิ์การเข้าถึง');
                console.error(error);
            }
        }

        function renderCharts(avgScores, overallScoresArray) {
            Chart.defaults.font.family = "'Prompt', sans-serif";
            
            // --- 1. กราฟแท่ง (Bar Chart) อัปเดตสีและเพิ่มแท่งความพึงพอใจรวม ---
            const ctxBar = document.getElementById('barChart').getContext('2d');
            if(barChartInstance) barChartInstance.destroy();
            
            barChartInstance = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: ['ระบบ Web App', 'ความรวดเร็ว', 'คุณภาพงาน', 'มารยาท', 'ภาพรวมทั้งหมด'],
                    datasets: [{
                        label: 'คะแนนเฉลี่ย (เต็ม 5)',
                        data: avgScores,
                        // กำหนดสีแท่งกราฟให้ต่างกันอย่างชัดเจน
                        backgroundColor: ['#3b82f6', '#10b981', '#8b5cf6', '#f59e0b', '#ec4899'],
                        borderRadius: 6,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 5 } },
                    plugins: { legend: { display: false } }
                }
            });

            // --- 2. กราฟโดนัท (Doughnut Chart) อัปเดตโทนสีให้ชัดเจน ---
            const scoreCounts = { '5':0, '4':0, '3':0, '2':0, '1':0 };
            overallScoresArray.forEach(score => { if(scoreCounts[score] !== undefined) scoreCounts[score]++; });

            const ctxDoughnut = document.getElementById('doughnutChart').getContext('2d');
            if(doughnutChartInstance) doughnutChartInstance.destroy();

            doughnutChartInstance = new Chart(ctxDoughnut, {
                type: 'doughnut',
                data: {
                    labels: ['5 ดาว', '4 ดาว', '3 ดาว', '2 ดาว', '1 ดาว'],
                    datasets: [{
                        data: [scoreCounts['5'], scoreCounts['4'], scoreCounts['3'], scoreCounts['2'], scoreCounts['1']],
                        // โทนสี เขียวเข้ม -> แดง
                        backgroundColor: ['#16a34a', '#84cc16', '#facc15', '#f97316', '#ef4444'],
                        borderWidth: 2,
                        borderColor: '#ffffff',
                        hoverOffset: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } }, // ย้าย Legend ไปด้านขวาให้อ่านง่าย
                    cutout: '65%'
                }
            });
        }

        // ฟังก์ชันสำหรับแสดงข้อเสนอแนะ
        function renderComments(commentsArray) {
            const container = document.getElementById('commentsContainer');
            container.innerHTML = '';

            if (commentsArray.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center py-6 italic">ยังไม่มีข้อเสนอแนะเพิ่มเติม</p>';
                return;
            }

            // นำ array มา reverse เพื่อให้คอมเมนต์ล่าสุด (แถวข้อล่างสุดใน Sheet) แสดงขึ้นก่อน
            const reversedComments = [...commentsArray].reverse();

            reversedComments.forEach(comment => {
                const commentBox = `
                    <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 flex gap-3 text-sm text-slate-700 transition-all hover:bg-blue-50">
                        <i class="fa-solid fa-comment-dots text-blue-400 text-lg mt-0.5"></i>
                        <p class="leading-relaxed">${comment}</p>
                    </div>
                `;
                container.innerHTML += commentBox;
            });
        }

        window.onload = fetchData;
    </script>
</body>
</html>
